name: Update

on:
  workflow_dispatch:
  label:
    types:
      - created # for test
  schedule:
      - cron: '30 16 * * 0-4' # 00:30 Beijing time every Monday to Friday
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write 

jobs:
  update_daily_papers:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Update papers
      run: |
        python main.py

    - name: Commit and push changes
      id: commit
      run: |
        git config user.name "Zhiling Chen"
        git config user.email "625676308@qq.com"
        git add README.md .github/ISSUE_TEMPLATE.md
        if git diff --cached --quiet; then
          echo "No paper updates to commit."
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          git commit -m "Update papers automatically."
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create an issue to notify
      if: steps.commit.outputs.changed == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const template = fs.readFileSync('.github/ISSUE_TEMPLATE.md', 'utf8');
          const frontMatterMatch = template.match(/^---\n([\s\S]*?)\n---\n?/);
          const frontMatter = frontMatterMatch?.[1] || '';
          const body = frontMatterMatch ? template.slice(frontMatterMatch[0].length) : template;
          const title = frontMatter.match(/^title:\s*(.+)$/m)?.[1] || 'Latest Papers';
          const labels = frontMatter.match(/^labels:\s*(.+)$/m)?.[1]
            ?.split(',')
            .map(label => label.trim())
            .filter(Boolean) || [];

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title,
            body,
            labels,
          });
